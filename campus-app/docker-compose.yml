# ============================================================================
# Campus App — Full Stack with Monitoring & Observability
# ============================================================================
# Usage:  docker compose up -d
# Ports:
#   8080  — Backend API (Spring Boot)
#   8081  — Frontend (Nginx)
#   5432  — PostgreSQL
#   5050  — pgAdmin
#   9090  — Prometheus
#   3000  — Grafana        (admin / admin)
#   3100  — Loki
#   9093  — Alertmanager
# ============================================================================

services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: campus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - campus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: campus-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@campus.example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - campus-pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  # ── Application ───────────────────────────────────────────────────────────
  campus-backend:
    build:
      context: ./backend
    container_name: campus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/campus
      SPRING_DATASOURCE_USERNAME: campus
      SPRING_DATASOURCE_PASSWORD: campus
    ports:
      - "8080:8080"
    labels:
      logging: "promtail"

  campus-frontend:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: campus-frontend
    restart: unless-stopped
    depends_on:
      - campus-backend
    ports:
      - "8081:8080"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
    labels:
      logging: "promtail"

  # ── Monitoring — Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: campus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - campus-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # ── Monitoring — Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: campus-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - campus-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # ── Monitoring — Loki (Log Aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: campus-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - campus-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ── Monitoring — Promtail (Log Shipper → Loki) ───────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: campus-promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml

  # ── Monitoring — Alertmanager ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: campus-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  campus-postgres-data:
  campus-pgadmin-data:
  campus-prometheus-data:
  campus-grafana-data:
  campus-loki-data:
