global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alertmanager integration ──
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Alert rules ──
rule_files:
  - /etc/prometheus/alert-rules.yml

# ── Scrape targets ──
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: campus-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - campus-backend:8080
